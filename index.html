<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Library</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 Prompt Library</h1>
            <p class="subtitle">Store and manage your favorite prompts</p>
        </header>

        <main>
            <section class="form-section">
                <div class="form-card">
                    <h2>Create New Prompt</h2>
                    <form id="promptForm">
                        <div class="form-group">
                            <label for="promptTitle">Prompt Title</label>
                            <input 
                                type="text" 
                                id="promptTitle" 
                                placeholder="e.g., Code Review Assistant"
                                required
                            >
                        </div>
                        <div class="form-group">
                            <label for="promptContent">Prompt Content</label>
                            <textarea 
                                id="promptContent" 
                                placeholder="Enter your prompt here..."
                                rows="6"
                                required
                            ></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">Save Prompt</button>
                    </form>
                </div>
            </section>

            <section class="prompts-section">
                <div class="section-header">
                    <h2>Saved Prompts</h2>
                    <span id="promptCount" class="prompt-count">0</span>
                </div>
                <div id="promptsContainer" class="prompts-grid">
                    <!-- Prompt cards will be inserted here -->
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
